<!DOCTYPE html>
<html>
<head>
<title>Web El Mubin Generation</title>

<style>

/* scroll halus */
html{
    scroll-behavior:smooth;
}

body{
    background-color: antiquewhite;
    margin:0;
    padding-top:70px;
    font-family: Arial, Helvetica, sans-serif;
}

/* ================= NAVBAR ================= */

.navbar{
    background-color: rgb(233,186,241);
    position:fixed;
    top:0;
    width:100%;
    padding:15px;
    display:flex;
    justify-content:center;
    gap:25px;
    z-index:100;
    transition:0.4s;
}

.navbar a{
    color:white;
    text-decoration:none;
    font-weight:bold;
    padding:8px 15px;
}

.navbar a:hover{
    color:black;
}

/* ================= SECTION ================= */

.section{
    min-height:100vh;
    text-align:center;
    padding-top:40px;
    scroll-margin-top:80px;
}

/* ================= IMAGE ================= */

img{
    width:400px;
    border-radius:10px;
    margin-top:20px;
}

/* ================= BUTTON ================= */

button{
    margin-top:20px;
    background-color:aliceblue;
    color:maroon;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background-color:#000629;
    color:white;
    transform:scale(1.1);
}

/* ================= FADE EFFECT ================= */

.fade{
    opacity:0;
    transform:translateY(40px);
    transition:1s;
}

.fade.show{
    opacity:1;
    transform:translateY(0);
}

</style>
</head>

<body>

<!-- ================= NAVBAR ================= -->

<div class="navbar" id="myNavbar">
    <a href="#home">Home</a>
    <a href="#menu">Menu</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
</div>


<!-- ================= HOME ================= -->

<div id="home" class="section">
    <h1 class="fade">EL MUBIN GENERATION</h1>
    <p class="fade">2019 - 2025</p>

    <img src="mbin.png" class="fade">

    <br>
    <button onclick="location.href='#menu'">
        Lihat Menu
    </button>
</div>


<!-- ================= MENU ================= -->

<div id="menu" class="section">
    <h2 class="fade">Menu Kami</h2>
    <p class="fade">
        Ini adalah bagian menu website El Mubin Generation.
    </p>
</div>


<!-- ================= ABOUT ================= -->

<div id="about" class="section">
    <h2 class="fade">About Us</h2>
    <p class="fade">
        Website ini dibuat untuk mengenang perjalanan
        EL MUBIN GENERATION dari tahun 2019 sampai 2025.
    </p>
</div>


<!-- ================= CONTACT ================= -->

<div id="contact" class="section">
    <h2 class="fade">Contact</h2>
    <p class="fade">
        Instagram : @ELMUBIN
    </p>
</div>


<!-- ================= JAVASCRIPT ================= -->

<script>

/* navbar berubah warna */
window.onscroll=function(){
    let navbar=document.getElementById("myNavbar");

    if(window.scrollY>50){
        navbar.style.background="#3377ff";
    }else{
        navbar.style.background="rgb(233,186,241)";
    }

    munculFade();
};

/* fade muncul */
const faders=document.querySelectorAll('.fade');

function munculFade(){
    faders.forEach(el=>{
        const posisi=el.getBoundingClientRect().top;
        const layar=window.innerHeight;

        if(posisi<layar-100){
            el.classList.add("show");
        }
    });
}

window.onload=munculFade;

</script>

</body>
</html>
