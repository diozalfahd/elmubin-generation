<!DOCTYPE html>
<html>
    <head>
        <title>Halaman Anggota</title>
        <style>

/* scroll halus */
html{
    scroll-behavior:smooth;
}

body{
    background-color: antiquewhite;
    margin:0;
    padding-top:70px;
    font-family: 'Times New Roman', Times, serif;
    text-align: center;
}

.menu{
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 50px;
}

.menu a{
    width: 120px;
    height: 120px;
    background: white;
    color: rgb(0, 0, 0);
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    border: 2px solid black;
    transition: 0.3s;
    transform:translateY(-8px);
    box-shadow:0 15px 25px rgba(0,0,0,0.3);
}

.menu a:hover{
    transform:translateY(-10px) scale(1.05);
}

.Putra:hover{
    background: aqua;
    color: white;
    transform: scale(1.1);
}

.Putri:hover{
    background: rgb(211, 69, 192);
    color: white;
    transform: scale(1.1);
    
}
        </style>
    </head>
<body>
    <h1>
        Pilih Anggota
    </h1>

    <div class="menu">
    <a href="halamanputra.html" class="Putra">
        Anggota Putra
    </a>    

    <a href="halamanputri.html" class="Putri">
        Anggota Putri
    </a>

    </div>
    
    <br><br>

    <button onclick="location.href='halaman1.html'">
    Kembali
    </button>
      
</body>
</html>
